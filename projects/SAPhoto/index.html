<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah Adam | Photography Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <header class="navbar">
        <div class="logo">Sarah Adam.</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#portfolio">Work</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Automated Hero Slider -->
    <section class="hero">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=2000&auto=format&fit=crop');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=2000&auto=format&fit=crop');"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1506744626753-1fa44f4a30e2?q=80&w=2000&auto=format&fit=crop');"></div>
        
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Through The Lens.</h1>
            <p>Automated visual storytelling.</p>
        </div>
    </section>

    <!-- Filterable Portfolio Section -->
    <section id="portfolio" class="portfolio-section">
        
        <!-- Category Filters -->
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all">All Works</button>
            <button class="filter-btn" data-filter="portrait">Portrait</button>
            <button class="filter-btn" data-filter="landscape">Landscape</button>
            <button class="filter-btn" data-filter="editorial">Editorial</button>
        </div>

        <!-- Dynamic Grid -->
        <div class="gallery-grid" id="gallery">
            <!-- Portrait -->
            <div class="gallery-item portrait" data-category="portrait">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1000&auto=format&fit=crop" alt="Portrait Work">
            </div>
            <!-- Landscape -->
            <div class="gallery-item landscape wide" data-category="landscape">
                <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=1000&auto=format&fit=crop" alt="Landscape Work">
            </div>
            <!-- Editorial -->
            <div class="gallery-item editorial tall" data-category="editorial">
                <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?q=80&w=1000&auto=format&fit=crop" alt="Editorial Work">
            </div>
            <!-- Portrait -->
            <div class="gallery-item portrait" data-category="portrait">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1000&auto=format&fit=crop" alt="Portrait Work">
            </div>
            <!-- Landscape -->
            <div class="gallery-item landscape" data-category="landscape">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=1000&auto=format&fit=crop" alt="Landscape Work">
            </div>
            <!-- Editorial -->
            <div class="gallery-item editorial" data-category="editorial">
                <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1000&auto=format&fit=crop" alt="Editorial Work">
            </div>
        </div>
    </section>

    <!-- Fullscreen Lightbox (Hidden by default) -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Fullscreen view">
    </div>

    <!-- JavaScript linked at the bottom -->
    <script src="script.js"></script>
</body>
</html>
