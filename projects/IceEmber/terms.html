<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms & Conditions | Ice & Embers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { charcoal: '#2B2521', oatmeal: '#F9F6F0' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9F6F0; color: #2B2521; }
        .font-serif { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="antialiased selection:bg-charcoal selection:text-white flex flex-col min-h-screen">

    <header class="w-full bg-oatmeal/95 border-b border-charcoal/10 py-3 px-6 flex justify-between items-center h-16 md:h-20">
        <a href="index.html" class="block h-full">
            <img src="images/logo-round.png" alt="Ice & Embers Logo" class="h-full w-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
            <span class="font-serif text-xl tracking-wider font-bold h-full hidden items-center">ICE & EMBERS</span>
        </a>
        <a href="index.html" class="text-xs font-semibold uppercase tracking-widest hover:opacity-60 transition">← Back to Site</a>
    </header>

    <main class="flex-grow max-w-5xl w-full mx-auto px-6 py-10 flex flex-col">
        
        <div class="mb-6 border-b border-charcoal/10 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
            <div>
                <h1 class="font-serif text-3xl font-bold mb-1">Participant Agreement</h1>
                <p class="text-sm opacity-80 leading-relaxed">Terms, Conditions & Waiver</p>
            </div>
            
            <a href="Terms_and_conditions.pdf" download class="bg-charcoal text-oatmeal px-5 py-2.5 text-xs font-semibold uppercase tracking-wider rounded shadow hover:bg-opacity-90 transition shrink-0">
                Download PDF
            </a>
        </div>

        <div class="flex-grow w-full bg-stone-200 rounded-lg border border-charcoal/10 overflow-hidden shadow-inner h-[65vh] min-h-[500px]">
            <iframe 
                src="Terms_and_conditions.pdf" 
                width="100%" 
                height="100%" 
                style="border: none;" 
                title="Ice & Embers Terms and Conditions">
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center">
                        <p class="mb-4">Your browser does not support inline PDF viewing.</p>
                        <a href="Terms_and_conditions.pdf" class="underline font-semibold">Click here to download the document.</a>
                    </div>
            </iframe>
        </div>
        
    </main>

    <footer class="bg-charcoal text-oatmeal/60 text-xs py-6 border-t border-white/5 mt-auto">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <p>© 2026 Ice & Embers Wood Fired Sauna. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
